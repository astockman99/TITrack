name: Build and Release (Signed)

# Trigger on version tags
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  # SignPath needs these for GitHub integration
  id-token: write
  actions: read

jobs:
  build:
    runs-on: windows-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build with PyInstaller
        run: pyinstaller ti_tracker.spec --noconfirm

      - name: Verify build artifacts
        run: |
          if (!(Test-Path "dist\TITrack\TITrack.exe")) {
            Write-Error "TITrack.exe not found!"
            exit 1
          }
          Write-Output "Build artifacts verified successfully"
        shell: pwsh

      - name: Create unsigned ZIP for signing
        run: |
          cd dist
          Compress-Archive -Path TITrack -DestinationPath TITrack-unsigned.zip
        shell: pwsh

      - name: Upload artifact for signing
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: TITrack-unsigned
          path: dist/TITrack-unsigned.zip

  sign:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      signing-request-id: ${{ steps.sign.outputs.signing-request-id }}

    steps:
      - name: Submit signing request to SignPath
        id: sign
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: titrack
          signing-policy-slug: release-signing
          artifact-configuration-slug: zip-artifact
          github-artifact-id: ${{ needs.build.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Upload signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: TITrack-signed
          path: signed/

  release:
    needs: [build, sign]
    runs-on: ubuntu-latest

    steps:
      - name: Download signed artifact
        uses: actions/download-artifact@v4
        with:
          name: TITrack-signed
          path: signed

      - name: Rename signed ZIP
        run: |
          mv signed/TITrack-unsigned.zip TITrack-${{ needs.build.outputs.version }}-windows.zip

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: TITrack-${{ needs.build.outputs.version }}-windows.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
